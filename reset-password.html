<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — UIVault by Kuvwy</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 24px;
    }

    .reset-box {
      background: #fff;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .reset-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .reset-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .reset-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .reset-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
      display: block;
    }

    .reset-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      color: var(--text-primary);
      outline: none;
      background: var(--bg-secondary);
      transition: border-color 0.2s;
    }

    .reset-input:focus {
      border-color: var(--kuvwy-orange);
    }

    .reset-submit {
      width: 100%;
      padding: 14px;
      background: var(--kuvwy-gradient);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .reset-submit:hover { opacity: 0.9; }
    .reset-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .reset-error {
      font-size: 0.82rem;
      color: #ef4444;
      background: rgba(239,68,68,0.07);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
    }

    .reset-success {
      font-size: 0.85rem;
      color: #22c55e;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      font-weight: 500;
    }

    .reset-back {
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .reset-back a {
      color: var(--kuvwy-orange);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="reset-box">
    <div class="reset-logo">
      <span class="logo-dot"></span>
      UIVault by Kuvwy
    </div>
    <h1 class="reset-title">Create New Password</h1>
    <p class="reset-subtitle">Choose a strong password for your account.</p>

    <div id="resetForm">
      <label class="reset-label" for="newPassword">New Password</label>
      <input type="password" id="newPassword" class="reset-input" placeholder="Min. 6 characters" />

      <label class="reset-label" for="confirmPassword" style="margin-top:12px;">Confirm Password</label>
      <input type="password" id="confirmPassword" class="reset-input" placeholder="Repeat your password" />

      <p class="reset-error" id="resetError" style="display:none; margin-top:8px;"></p>

      <button class="reset-submit" id="resetSubmit" style="margin-top:16px;">Update Password</button>
    </div>

    <div class="reset-success" id="resetSuccess" style="display:none;">
      ✓ Password updated! Redirecting you to the site...
    </div>

    <p class="reset-back"><a href="index.html">← Back to UIVault</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://umfwvksnaqgtjvkgpgow.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_W9XISd-bgINvMvzqe6Xe3g_vBxyTa8p';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const resetSubmit = document.getElementById('resetSubmit');
    const resetError = document.getElementById('resetError');
    const resetSuccess = document.getElementById('resetSuccess');
    const resetForm = document.getElementById('resetForm');

    resetSubmit.addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      resetError.style.display = 'none';

      if (!newPassword || newPassword.length < 6) {
        resetError.textContent = 'Password must be at least 6 characters.';
        resetError.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        resetError.textContent = 'Passwords do not match.';
        resetError.style.display = 'block';
        return;
      }

      resetSubmit.disabled = true;
      resetSubmit.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password: newPassword });

      if (error) {
        resetError.textContent = error.message || 'Something went wrong. Please try again.';
        resetError.style.display = 'block';
        resetSubmit.disabled = false;
        resetSubmit.textContent = 'Update Password';
        return;
      }

      resetForm.style.display = 'none';
      resetSuccess.style.display = 'block';

      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2500);
    });
  </script>
</body>
</html>
